<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860">
  <defs>
    <style>
      .title { font: 700 34px sans-serif; fill: #1f2937; }
      .subtitle { font: 18px sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .panelTitle { font: 700 28px sans-serif; }
      .note { font: 16px sans-serif; fill: #475569; }
      .body { fill: #bfdbfe; stroke: #2563eb; stroke-width: 2.5; }
      .guard { fill: #e2e8f0; stroke: #475569; stroke-width: 2; }
      .wheel { fill: #6b7280; stroke: #111827; stroke-width: 1.5; }
      .camera { fill: #06b6d4; stroke: #0f172a; stroke-width: 1.5; }
      .axis { stroke: #cbd5e1; stroke-width: 1.4; stroke-dasharray: 7 6; }
      .fov { stroke: #0891b2; stroke-width: 1.8; stroke-dasharray: 7 6; fill: none; }
      .pickupLine { stroke: #dc2626; stroke-width: 6; stroke-linecap: round; }
      .pickupBand { fill: rgba(34, 197, 94, 0.18); stroke: #16a34a; stroke-width: 3; }
      .guardEdge { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 5 5; }
      .arrowRed { stroke: #dc2626; stroke-width: 2; fill: none; marker-end: url(#tipRed); }
      .arrowGreen { stroke: #16a34a; stroke-width: 2; fill: none; marker-end: url(#tipGreen); }
      .ball { fill: #f59e0b; stroke: #b45309; stroke-width: 2; }
      .badgeRed { fill: #fef2f2; stroke: #fecaca; stroke-width: 1.5; }
      .badgeGreen { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 1.5; }
      .textRed { font: 700 20px sans-serif; fill: #b91c1c; }
      .textGreen { font: 700 20px sans-serif; fill: #15803d; }
    </style>
    <marker id="tipRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="tipGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1440" height="860" fill="#f8fafc"/>
  <text x="40" y="54" class="title">Pickup Range Comparison Using the Actual Car Geometry</text>
  <text x="40" y="86" class="subtitle">The car body, guard arms, guard-tip circles, camera position, and FOV follow the current URDF. With the updated FOV, the improved pickup strip is now limited by the inner tangency distance of the front tip circles.</text>

  <rect x="36" y="126" width="656" height="680" rx="22" ry="22" class="panel"/>
  <rect x="748" y="126" width="656" height="680" rx="22" ry="22" class="panel"/>

  <text x="74" y="176" class="panelTitle" fill="#b91c1c">Traditional Strategy</text>
  <text x="786" y="176" class="panelTitle" fill="#15803d">Improved Strategy</text>
  <text x="74" y="208" class="subtitle">Pickup target is a single forward line.</text>
  <text x="786" y="208" class="subtitle">Pickup target is a forward strip whose width equals the minimum inner opening between the two front tip circles.</text>

  <!-- Left panel -->
  <g transform="translate(300,446)">
    <line x1="-165" y1="0" x2="440" y2="0" class="axis"/>
    <line x1="0" y1="-260" x2="0" y2="260" class="axis"/>

    <!-- guard outer edge reference -->
    <line x1="359.68" y1="-235.00" x2="359.68" y2="235.00" class="guardEdge"/>

    <!-- guards -->
    <g transform="translate(208,-124.8) rotate(-34.377)">
      <rect x="-143" y="-4.7" width="286" height="9.4" class="guard"/>
      <circle cx="159" cy="0" r="20.8" class="guard"/>
    </g>
    <g transform="translate(208,124.8) rotate(34.377)">
      <rect x="-143" y="-4.7" width="286" height="9.4" class="guard"/>
      <circle cx="159" cy="0" r="20.8" class="guard"/>
    </g>

    <!-- body -->
    <rect x="-130" y="-130" width="260" height="260" class="body"/>

    <!-- camera -->
    <rect x="124.8" y="-26" width="10.4" height="52" class="camera"/>

    <!-- wheels -->
    <rect x="78" y="-148.2" width="31.2" height="15.6" class="wheel"/>
    <rect x="78" y="132.6" width="31.2" height="15.6" class="wheel"/>
    <rect x="-109.2" y="-148.2" width="31.2" height="15.6" class="wheel"/>
    <rect x="-109.2" y="132.6" width="31.2" height="15.6" class="wheel"/>

    <!-- traditional pickup line -->
    <line x1="130" y1="0" x2="360" y2="0" class="pickupLine"/>

    <!-- sample ball -->
    <circle cx="332" cy="-82" r="16" class="ball"/>

    <path d="M 454 -122 C 420 -116, 382 -114, 360 -104" class="arrowRed"/>
    <text x="462" y="-126" class="textRed">Pickup line only</text>

    <path d="M 448 -38 C 408 -36, 370 -48, 339 -72" class="arrowRed"/>
    <text x="456" y="-42" class="textRed">Ball still needs alignment</text>
  </g>

  <rect x="82" y="680" width="564" height="86" rx="16" ry="16" class="badgeRed"/>
  <text x="108" y="716" class="textRed">Admissible set = one line segment</text>
  <text x="108" y="744" class="note">Even with the same guard geometry, the planner only accepts contact on the center forward line.</text>

  <!-- Right panel -->
  <g transform="translate(1012,446)">
    <line x1="-165" y1="0" x2="440" y2="0" class="axis"/>
    <line x1="0" y1="-260" x2="0" y2="260" class="axis"/>

    <!-- FOV from camera center, HFOV = 90 deg -->
    <line x1="130" y1="0" x2="359.68" y2="-229.68" class="fov"/>
    <line x1="130" y1="0" x2="359.68" y2="229.68" class="fov"/>

    <!-- improved pickup strip: width follows inner tangency distance of the two tip circles -->
    <rect x="359.68" y="-193.55" width="128" height="387.11" class="pickupBand"/>

    <!-- guards -->
    <g transform="translate(208,-124.8) rotate(-34.377)">
      <rect x="-143" y="-4.7" width="286" height="9.4" class="guard"/>
      <circle cx="159" cy="0" r="20.8" class="guard"/>
    </g>
    <g transform="translate(208,124.8) rotate(34.377)">
      <rect x="-143" y="-4.7" width="286" height="9.4" class="guard"/>
      <circle cx="159" cy="0" r="20.8" class="guard"/>
    </g>

    <!-- body -->
    <rect x="-130" y="-130" width="260" height="260" class="body"/>

    <!-- camera -->
    <rect x="124.8" y="-26" width="10.4" height="52" class="camera"/>

    <!-- wheels -->
    <rect x="78" y="-148.2" width="31.2" height="15.6" class="wheel"/>
    <rect x="78" y="132.6" width="31.2" height="15.6" class="wheel"/>
    <rect x="-109.2" y="-148.2" width="31.2" height="15.6" class="wheel"/>
    <rect x="-109.2" y="132.6" width="31.2" height="15.6" class="wheel"/>

    <!-- sample ball -->
    <circle cx="334" cy="-82" r="16" class="ball"/>

    <path d="M 500 -158 C 468 -154, 430 -148, 390 -142" class="arrowGreen"/>
    <text x="506" y="-162" class="textGreen">Strip width follows the tip-circle inner opening</text>

    <path d="M 506 -70 C 464 -62, 414 -60, 346 -82" class="arrowGreen"/>
    <text x="514" y="-74" class="textGreen">Ball already inside the strip</text>
  </g>

  <rect x="794" y="680" width="564" height="86" rx="16" ry="16" class="badgeGreen"/>
  <text x="820" y="716" class="textGreen">Admissible set = a capture strip</text>
  <text x="820" y="744" class="note">Strip width = front tip-circle inner tangency distance, about 0.744 m. After the HFOV update to 90 deg, the FOV is no longer the limiting width.</text>

  <text x="40" y="832" class="subtitle">Geometry used in the drawing: body = 0.50 m x 0.50 m, front tip-circle center = (0.6517, +/-0.4122) m, inner tangency width = 0.7444 m, camera center x = 0.25 m, camera horizontal FOV = 90 deg.</text>
</svg>
